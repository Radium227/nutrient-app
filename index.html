function todayStr(d){
  const dt = d?new Date(d):new Date();
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,'0');
  const day = String(dt.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtDateLabel(dstr){
  const d = new Date(dstr+'T00:00:00');
  const t = new Date(todayStr()+'T00:00:00');
  const diff = Math.round((t-d)/86400000);
  if(diff===0) return 'Today';
  if(diff===1) return 'Yesterday';
  return d.toLocaleDateString(undefined,{month:'short', day:'numeric'});
}

let storageHealthy = true;
let storageWarned = false;

// Every value lives at users/{uid}/kv/{key} as {value: <JSON string>}.
// This mirrors the old window.storage.get/set(key, value) shape exactly,
// so everything downstream (loadDay, loadSettings, etc.) is unchanged.
function kvDoc(key){
  if(!currentUser) throw new Error('Not signed in');
  return db.collection('users').doc(currentUser.uid).collection('kv').doc(key);
}
async function storeGet(key){
  try{
    const snap = await kvDoc(key).get();
    if(!snap.exists) return null;
    const data = snap.data();
    return data && data.value ? JSON.parse(data.value) : null;
  }
  catch(e){ return null; }
}
// Retries once, then falls back gracefully instead of failing silently or
// spamming the console. Returns true if it actually persisted, false if not
// (caller keeps working off in-memory state either way). Firestore's own
// offline cache means writes still queue locally and sync later even when
// this "fails" due to being offline — this flag is about surfacing that.
async function storeSet(key, val, attempt = 1){
  try{
    await kvDoc(key).set({value: JSON.stringify(val), updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
    storageHealthy = true;
    return true;
  } catch(e){
    if(attempt < 2){
      await new Promise(r=>setTimeout(r, 600));
      return storeSet(key, val, attempt + 1);
    }
    storageHealthy = false;
    console.error('Cloud storage save failed after retry — continuing with in-memory data for this session.', e);
    if(!storageWarned){
      storageWarned = true;
      showToast('Cloud sync unavailable — working offline for this session');
    }
    return false;
  }
}
// Keys sharing the "day:" prefix, for export. Range query on the doc ID
// since Firestore has no native "starts with" filter.
async function listDayKeys(){
  if(!currentUser) return [];
  const col = db.collection('users').doc(currentUser.uid).collection('kv');
  const snap = await col
    .where(firebase.firestore.FieldPath.documentId(), '>=', 'day:')
    .where(firebase.firestore.FieldPath.documentId(), '<', 'day:\uf8ff')
    .get();
  return snap.docs.map(d=>d.id);
}

async function loadDay(dstr){
  if(dayCache[dstr]) return dayCache[dstr];
  const d = await storeGet('day:'+dstr) || {foods:[], exercises:[], weight:null};
  // Migration: older entries stored a single overwriteable `weight` number.
  // Convert that into the new `weights` list (multiple logs/day) so nothing
  // gets silently dropped for people who already have data saved.
  if(!Array.isArray(d.weights)){
    d.weights = (d.weight!=null) ? [{id:'w'+Date.now(), value:d.weight, ts:Date.parse(dstr+'T12:00:00')||Date.now()}] : [];
  }
  dayCache[dstr] = d;
  return d;
}
// Latest weight logged on a given day (chronologically last entry), or null.
function latestWeight(day){
  const list = day.weights||[];
  if(!list.length) return null;
  return list.reduce((a,b)=> (b.ts>a.ts ? b : a)).value;
}
function fmtTime(ts){
  return new Date(ts).toLocaleTimeString(undefined,{hour:'numeric', minute:'2-digit'});
}
// Photos are never written to Firestore — they bloat every day document
// (each is 100s of KB of base64) which is what was making saves and syncs
// slow. We strip them right before the network write but leave dayCache
// (in-memory) untouched, so the photo still shows instantly in this
// session; it just won't be there after a reload.
function stripPhotos(day){
  if(!day || !Array.isArray(day.foods)) return day;
  const hasPhoto = day.foods.some(f=>f.photo);
  if(!hasPhoto) return day;
  return {...day, foods: day.foods.map(f => f.photo ? {...f, photo:null} : f)};
}
async function saveDay(dstr){
  return storeSet('day:'+dstr, stripPhotos(dayCache[dstr]));
}

const TARGETS_VERSION = 2; // bump whenever default NUTRIENTS targets change meaningfully
async function loadSettings(){
  const p = await storeGet('profile');
  if(p) profile = Object.assign(profile, p);
  const t = await storeGet('targetOverrides');
  if(t) targetOverrides = t;
  savedMeals = await storeGet('savedMeals') || [];
  foodLibrary = await storeGet('foodLibrary') || {};
  // One-time migration: earlier versions auto-saved calories/protein/fat/carbs
  // overrides from a generic formula. Those stale numbers would otherwise sit
  // in storage and silently mask the new personalized plan defaults below.
  const versionRecord = await storeGet('targetsVersion');
  if(!versionRecord || versionRecord.v !== TARGETS_VERSION){
    ['calories','protein','fat','carbs'].forEach(id=>{ delete targetOverrides[id]; });
    await storeSet('targetOverrides', targetOverrides);
    await storeSet('targetsVersion', {v: TARGETS_VERSION});
  }
}

/* =========================================================
   TARGET CALCULATIONS
========================================================= */
function computeCalorieTarget(){
  const {age, sex, height, weight, activity, goal} = profile;
  let bmr;
  if(sex==='male') bmr = 10*weight + 6.25*height - 5*age + 5;
  else bmr = 10*weight + 6.25*height - 5*age - 161;
  return Math.round(bmr*activity + Number(goal));
}
function getTarget(id){
  if(targetOverrides[id]!==undefined) return targetOverrides[id];
  const def = NUTRIENTS.find(n=>n.id===id);
  return def ? def.rda : 0;
}

// Ranks a food's nutrients by "density" — how much of the daily target a
// typical serving covers — so the standout nutrient (e.g. potassium for a
// banana, vitamin C for an orange) surfaces first instead of always
// leading with the same generic macro list.
// Ordered by general nutritional importance to the body — foundational
// energy/macros first, then the vitamins/minerals most commonly emphasized
// for health and most often deficient, then other essential micronutrients,
// then essential amino acids (the body can't make these), then non-essential
// amino acids, then nutrients you mainly want to watch/limit, then minor
// breakdown sub-totals (soluble fiber, net carbs, etc.) that are already
// captured by their parent nutrient. This is what "Nutrient completion"
// sorts by, so hitting your calcium or vitamin D target shows up near the
// top even at 100%+, instead of always being buried under a long tail of
// amino acids sitting at 3-4%.
const NUTRIENT_IMPORTANCE_ORDER = [
  'calories','protein','fiber','water',
  'vitaminD','vitaminB12','iron','calcium','vitaminC','magnesium','zinc','folateB9','potassium','omega3',
  'vitaminA','vitaminK','vitaminE','vitaminB6','thiaminB1','riboflavinB2','niacinB3','pantothenicAcidB5','biotinB7','choline',
  'iodine','selenium','copper','manganese','phosphorus','chromium','molybdenum','fluoride',
  'carbs','fat','monounsaturatedFat','polyunsaturatedFat','linoleicAcid','omega6','ala','epa','dha',
  'leucine','lysine','isoleucine','valine','threonine','phenylalanine','methionine','histidine','tryptophan',
  'arginine','glutamicAcid','asparticAcid','glycine','proline','serine','alanine','tyrosine','cystine',
  'sodium','saturatedFat','cholesterol','addedSugars','sugars','transFat','caffeine','alcohol','sulfur',
  'retinol','betaCarotene',
  'netCarbs','starch','solubleFiber','insolubleFiber','sugarAlcohols'
];
const NUTRIENT_IMPORTANCE_RANK = {};
NUTRIENT_IMPORTANCE_ORDER.forEach((id,i)=>{ NUTRIENT_IMPORTANCE_RANK[id] = i; });
function nutrientImportanceRank(id){
  return NUTRIENT_IMPORTANCE_RANK[id] !== undefined ? NUTRIENT_IMPORTANCE_RANK[id] : NUTRIENT_IMPORTANCE_ORDER.length;
}

function shortNutrientLabel(name){
  return name.replace(/\s*\([^)]*\)\s*$/,'').trim() || name;
}
function nutrientHighlights(nutrients, excludeIds){
  const exclude = new Set(excludeIds||[]);
  const list = [];
  NUTRIENTS.forEach(n=>{
    if(exclude.has(n.id)) return;
    const v = nutrients ? nutrients[n.id] : 0;
    if(!v || v<=0) return;
    const t = getTarget(n.id);
    const pct = t>0 ? (v/t)*100 : 0;
    list.push({id:n.id, name:n.name, unit:n.unit, cat:n.cat, value:v, pct});
  });
  list.sort((a,b)=> b.pct - a.pct);
  return list;
}
// Picks up to `count` nutrients to spotlight for a single food item, most
// nutrient-dense first. Falls back to common macros if a food doesn't have
// enough data to fill every slot.
function pickHighlightNutrients(nutrients, excludeIds, count){
  const highlights = nutrientHighlights(nutrients, excludeIds);
  const chosen = highlights.slice(0, count);
  if(chosen.length < count){
    ['carbs','fat','fiber','sodium'].forEach(id=>{
      if(chosen.length>=count) return;
      if((excludeIds||[]).includes(id)) return;
      if(chosen.some(c=>c.id===id)) return;
      const n = NUTRIENTS.find(x=>x.id===id);
      if(!n) return;
      chosen.push({id, name:n.name, unit:n.unit, cat:n.cat, value:(nutrients&&nutrients[id])||0, pct:0});
    });
  }
  return chosen;
}

/* =========================================================
   TOTALS
========================================================= */
function computeTotals(day){
  const totals = {};
  NUTRIENTS.forEach(n=>totals[n.id]=0);
  (day.foods||[]).forEach(f=>{
    NUTRIENTS.forEach(n=>{
      const v = f.nutrients && f.nutrients[n.id];
      if(typeof v === 'number') totals[n.id]+=v;
    });
  });
  return totals;
}
function computeBurned(day){
  return (day.exercises||[]).reduce((s,e)=>s+(Number(e.calories)||0),0);
}

function renderDashboard(day){
  const totals = computeTotals(day);
  const burned = computeBurned(day);
  const calTarget = getTarget('calories');
  const consumed = Math.round(totals.calories);
  const remaining = calTarget - consumed + burned;
  document.getElementById('calConsumed').textContent = consumed;
  document.getElementById('calTarget').textContent = calTarget;
  document.getElementById('calSub').textContent = burned>0 ? `consumed · ${burned} kcal burned` : 'consumed today';
  document.getElementById('calRemaining').textContent = Math.abs(remaining);
  document.getElementById('calRemaining').style.color = remaining<0 ? 'var(--danger)' : 'var(--text)';
  document.getElementById('calRemainingLabel').textContent = remaining<0 ? 'kcal over' : 'kcal remaining';
  const pct = calTarget>0 ? Math.min(100, (consumed/calTarget)*100) : 0;
  document.getElementById('calBarFill').style.width = pct+'%';
  document.getElementById('calBarFill').style.background = progressColor(pct);

  // Under 1000 kcal usually means logging was incomplete that day, so it's
  // excluded from the Trends average by default (see renderTrends). This
  // tiny chip only appears when relevant, and lets you flag a day as an
  // intentional fast so it still counts toward the average.
  const fastChip = document.getElementById('fastDayChip');
  if(consumed < 1000){
    const flagged = !!day.countLowCalorieDay;
    fastChip.style.display = 'inline-block';
    fastChip.classList.toggle('active', flagged);
    fastChip.textContent = flagged ? '✓ Added' : 'Add';
    fastChip.title = flagged ? 'Counted toward your average — tap to remove' : 'Count this fasting day toward your average intake';
  } else {
    fastChip.style.display = 'none';
  }

  const macros = [
    {id:'protein', label:'Protein', color:'var(--macro)'},
    {id:'carbs', label:'Carbs', color:'var(--vit)'},
    {id:'fat', label:'Fat', color:'var(--min)'},
  ];
  document.getElementById('macroMini').innerHTML = macros.map(m=>{
    const v = totals[m.id]||0; const t = getTarget(m.id)||1;
    const p = Math.min(100, (v/t)*100);
    return `<div class="macro-chip">
      <div class="l">${m.label}</div>
      <div class="v">${Math.round(v)}<span style="color:var(--text-faint)">/${Math.round(t)}g</span></div>
      <div class="bar"><span style="width:${p}%; background:${barColor(p, m.color)}"></span></div>
    </div>`;
  }).join('');

  // Water card
  const waterVal = totals.water||0;
  const waterTarget = getTarget('water')||4000;
  const waterPct = Math.min(100, (waterVal/waterTarget)*100);
  document.getElementById('waterAmount').textContent = (waterVal/1000).toFixed(waterVal%1000===0?0:1)+' L';
  document.getElementById('waterTargetLbl').textContent = 'of '+(waterTarget/1000)+' L';
  document.getElementById('waterBarFill').style.width = waterPct+'%';
  document.getElementById('waterBarFill').style.background = barColor(waterPct, 'var(--min)');

  // spectrum / overall completion
  let bars = '';
  let metCount = 0, totalCount = 0, pctSum = 0;
  NUTRIENTS.forEach(n=>{
    const t = getTarget(n.id);
    if(!t || t<=0) return;
    totalCount++;
    const v = totals[n.id]||0;
    const pctCapped = Math.min(100, (v/t)*100);
    pctSum += pctCapped;
    if(pctCapped>=100) metCount++;
    bars += `<div class="bar" style="height:${Math.max(3,pctCapped*0.62)}px; background:${progressColor(pctCapped)}" title="${n.name}: ${Math.round(v*10)/10}${n.unit} / ${t}${n.unit}"></div>`;
  });
  document.getElementById('spectrumBars').innerHTML = bars;
  const overallPct = totalCount ? Math.round(pctSum/totalCount) : 0;
  document.getElementById('spectrumCount').textContent = `${overallPct}% complete · ${metCount}/${totalCount} at target`;

  // diary preview
  const foods = day.foods||[];

// Progress color: smooth red -> orange -> yellow -> green ramp based on % of
// target reached. Replaces fixed per-category colors (e.g. amino acids no
// longer show as flat purple) so every bar communicates progress at a glance.
function progressColor(pct){
  pct = Math.max(0, Math.min(100, pct));
  const stops = [
    {p:0,   c:[239,68,68]},   // red
    {p:50,  c:[249,115,22]},  // orange
    {p:75,  c:[234,179,8]},   // yellow
    {p:100, c:[34,197,94]}    // green
  ];
  let lo = stops[0], hi = stops[stops.length-1];
  for(let i=0;i<stops.length-1;i++){
    if(pct>=stops[i].p && pct<=stops[i+1].p){ lo=stops[i]; hi=stops[i+1]; break; }
  }
  const range = (hi.p - lo.p) || 1;
  const t = (pct - lo.p) / range;
  const r = Math.round(lo.c[0] + (hi.c[0]-lo.c[0])*t);
  const g = Math.round(lo.c[1] + (hi.c[1]-lo.c[1])*t);
  const b = Math.round(lo.c[2] + (hi.c[2]-lo.c[2])*t);
  return `rgb(${r},${g},${b})`;
}
function barColor(pct, baseColor){ return progressColor(pct); }
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }

let weightChartInst=null, calorieChartInst=null, exerciseChartInst=null;
async function renderTrends(){
  const days = [];
  for(let i=13;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    days.push(todayStr(d));
  }
  const dayDatas = await Promise.all(days.map(loadDay));

  // Plot every individual weight log (not collapsed to one-per-day) at its
  // real timestamp, so multiple same-day entries both show up correctly.
  const weightPoints = [];
  dayDatas.forEach(d=>{
    (d.weights||[]).forEach(w=>{
      if(w && typeof w.value==='number') weightPoints.push({x:w.ts, y:w.value});
    });
  });
  weightPoints.sort((a,b)=>a.x-b.x);
  const rangeStartTs = new Date(days[0]+'T00:00:00').getTime();
  const rangeEndTs = new Date(days[days.length-1]+'T23:59:59').getTime();

  const intakes = dayDatas.map(d=>Math.round(computeTotals(d).calories));
  const burns = dayDatas.map(d=>computeBurned(d));
  const calTarget = getTarget('calories');
  // Split each day's intake at the target: the portion under/equal to target
  // stays the normal "Intake" color, anything beyond it is drawn stacked on
  // top in red so days you went over your calorie budget stand out.
  const withinTarget = intakes.map(v=>Math.min(v, calTarget));
  const overTarget = intakes.map(v=>Math.max(0, v-calTarget));

  const labels = days.map(d=>new Date(d+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'}));

  try{
    const ctx1 = document.getElementById('weightChart');

      type:'line',

        data:weightPoints,
        borderColor:'#5FB2E8',
        borderWidth:2.5,
        backgroundColor:(ctx)=>{
          const {chart} = ctx;
          const {ctx:c, chartArea} = chart;
          if(!chartArea) return 'rgba(95,178,232,0.15)';
          const g = c.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
          g.addColorStop(0, 'rgba(95,178,232,0.32)');
          g.addColorStop(1, 'rgba(95,178,232,0)');
          return g;
        },
        fill:true,
        tension:0.3,
        spanGaps:true,
        pointRadius:4,
        pointHoverRadius:6,
        pointBackgroundColor:'#5FB2E8',
        pointBorderColor:'#EAF3EF',
        pointBorderWidth:1.5
      }]},
      options:{
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{
            title:(items)=> new Date(items[0].parsed.x).toLocaleString(undefined,{month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}),
            label:(item)=> `${item.parsed.y} kg`
          }}
        },
        scales:{
          x:{
            type:'linear',
            min:rangeStartTs, max:rangeEndTs,
            ticks:{color:'#6D897E', maxTicksLimit:5, callback:(v)=>new Date(v).toLocaleDateString(undefined,{month:'short',day:'numeric'})},
            grid:{color:'#2C4941'}
          },
          y:{ticks:{color:'#6D897E'}, grid:{color:'#2C4941'}}
        }
      }
    });
  }catch(err){
    console.error('Weight chart failed to render:', err);
  }

  // Exercise minutes aggregated by activity over the same window, shown as
  // a doughnut. Reuses the macro/vitamin/mineral/amino/other palette from
  // the Nutrient Spectrum so it matches the rest of the app visually.
  const exerciseTotals = {};
  let totalExerciseMinutes = 0, totalExerciseSessions = 0;
  dayDatas.forEach(d=>{
    (d.exercises||[]).forEach(e=>{
      const mins = Number(e.minutes)||0;
      exerciseTotals[e.name] = (exerciseTotals[e.name]||0) + mins;
      totalExerciseMinutes += mins;
      totalExerciseSessions += 1;
    });
  });
  document.getElementById('totalExerciseMinutes').textContent = totalExerciseMinutes ? totalExerciseMinutes+' min' : '—';
  document.getElementById('totalExerciseSessions').textContent = totalExerciseSessions || '—';
  const exCanvas = document.getElementById('exerciseChart');
  const exEmpty = document.getElementById('exerciseEmptyState');
  if(exerciseChartInst){ exerciseChartInst.destroy(); exerciseChartInst=null; }
  const exerciseLabels = Object.keys(exerciseTotals);
  if(exerciseLabels.length){
    exCanvas.style.display='block';
    exEmpty.style.display='none';
    const exercisePalette = ['#FF8F5E','#F3C948','#5FB2E8','#C08CF0','#6BCB9E'];
    try{
      exerciseChartInst = new Chart(exCanvas, {
        type:'doughnut',
        data:{
          labels:exerciseLabels,
          datasets:[{
            data:exerciseLabels.map(l=>exerciseTotals[l]),
            backgroundColor:exerciseLabels.map((_,i)=>exercisePalette[i%exercisePalette.length]),
            borderColor:'#152622',
            borderWidth:2
          }]
        },
        options:{
          cutout:'62%',
          plugins:{
            legend:{position:'bottom', labels:{color:'#9FBAB0', boxWidth:10, boxHeight:10, padding:12, font:{family:"'IBM Plex Sans', sans-serif", size:11}}},
            tooltip:{callbacks:{label:(item)=>`${item.label}: ${item.parsed} min`}}
          }
        }
      });
    }catch(err){
      console.error('Exercise chart failed to render:', err);
    }
  } else {
    exCanvas.style.display='none';
    exEmpty.style.display='block';
  }

  try{
    const ctx2 = document.getElementById('calorieChart');
    if(calorieChartInst) calorieChartInst.destroy();
    calorieChartInst = new Chart(ctx2, {
      type:'bar',
      data:{labels, datasets:[
        {type:'bar', label:'Intake', data:withinTarget, backgroundColor:'#FF8F5E', stack:'intake', order:2},
        {type:'bar', label:'Over target', data:overTarget, backgroundColor:'#E8544B', stack:'intake', order:2},
        {type:'bar', label:'Burned', data:burns, backgroundColor:'#6BCB9E', stack:'burned', order:2},
        {type:'line', label:'Target', data:labels.map(()=>calTarget), borderColor:'#EAF3EF', borderDash:[5,4], borderWidth:1.5, pointRadius:0, fill:false, order:1},
      ]},
      options:{plugins:{legend:{labels:{color:'#EAF3EF'}}}, scales:{
        x:{stacked:true, ticks:{color:'#6D897E', maxTicksLimit:5}, grid:{display:false}},
        y:{stacked:true, ticks:{color:'#6D897E'}, grid:{color:'#2C4941'}}
      }}
    });
  }catch(err){
    console.error('Calorie chart failed to render:', err);
  }

  // Days under 1000 kcal are usually a logging gap, not a real intake day,
  // so they'd drag the average down misleadingly. They're excluded from the
  // average unless the person explicitly marked that day as an intentional
  // fast (day.countLowCalorieDay), via the toggle shown on the Dashboard.
  const LOW_CAL_FLOOR = 1000;
  const validIntakes = intakes.filter((v,i) => v >= LOW_CAL_FLOOR || dayDatas[i].countLowCalorieDay);
  const validBurns = burns.filter(v=>v>0);
  document.getElementById('avgIntake').textContent = validIntakes.length ? Math.round(validIntakes.reduce((a,b)=>a+b,0)/validIntakes.length)+' kcal' : '—';
  document.getElementById('avgBurn').textContent = validBurns.length ? Math.round(validBurns.reduce((a,b)=>a+b,0)/validBurns.length)+' kcal' : '—';
}

const NUTRIENT_KEY_LIST = NUTRIENTS.map(n=>`${n.id} (${n.unit})`).join(', ');

function buildPrompt(context, notes){
  let p = `You are a professional nutrition analyst with USDA FoodData Central-level knowledge of food composition. Identify each distinct food/drink item in the ${context}, and estimate a realistic portion size in grams for what was actually consumed.

For each item, estimate a COMPLETE nutrient profile. Your response has a generous length budget, so there is no reason to skip categories to save space — completeness and accuracy matter far more than brevity.

Nutrient fields to estimate: ${NUTRIENT_KEY_LIST}

MANDATORY — amino acids: if an item contains roughly 2g of protein or more, you MUST estimate ALL 18 amino acids listed (histidine, isoleucine, leucine, lysine, methionine, cystine, phenylalanine, tyrosine, threonine, tryptophan, valine, alanine, arginine, aspartic acid, glutamic acid, glycine, proline, serine), scaled to that food's real, typical amino acid composition per gram of protein. Eggs, poultry, meat, fish, and dairy are complete proteins particularly rich in leucine, lysine, and the branched-chain amino acids — their amino acid fields should never come back as zero or be left out. A small mg value is still real, meaningful data — it is not "negligible" just because the number looks small next to a calorie count.

MANDATORY — vitamins and minerals: include every vitamin and mineral the food is a genuine, documented source of, even in modest amounts (e.g. don't omit vitamin D, B12, or choline for eggs; iron, zinc, and B vitamins for meat; potassium and vitamin C for produce). Draw on the food's actual well-documented nutrient profile rather than defaulting to only the 3-4 most obvious fields.

You may omit a field only when it is genuinely and categorically absent for that food — e.g. omega-3/EPA/DHA for a food with essentially no fat, caffeine for something that plainly contains none, alcohol for a non-alcoholic item. "Omit if small" is NOT license to drop amino acids, vitamins, or minerals that the food actually contains in real, if modest, amounts — those must still be reported.`;
  if(notes && notes.trim()){
    p += `\n\nAdditional context from the person logging this meal (treat as reliable and factor it into your estimate): """${notes.trim()}"""`;
  }
  p += `\n\nRespond with ONLY valid, complete JSON — no markdown fences, no commentary — matching exactly this schema:
{"items":[{"name":"string, short food name","gramsEstimate":number,"confidence":"high|medium|low","nutrients":{"<nutrientId>":number, ...}}]}
Keep item names short. Fully complete every item's nutrient object — including its amino acids, vitamins, and minerals — before starting the next item; never truncate mid-object.`;
  return p;
}

function parseGeminiJson(data){
  const text = data.text || '';
  const clean = text.replace(/```json|```/g,'').trim();
  const firstBrace = clean.indexOf('{');
  const lastBrace = clean.lastIndexOf('}');
  if(firstBrace===-1) throw new Error('No structured data returned. Try again with a clearer photo or description.');
  let jsonStr = clean.slice(firstBrace, lastBrace+1);
  try{
    return JSON.parse(jsonStr);
  }catch(parseErr){
    // Response likely got cut off mid-item (e.g. a very long, many-item meal).
    // Try to salvage the items that finished completely before the cutoff.
    const repaired = repairTruncatedItemsJson(jsonStr);
    if(repaired) return repaired;
    if(data.finishReason==='MAX_TOKENS'){
      throw new Error('That meal has too many items/details for one pass — try logging it in two smaller batches.');
    }
    throw parseErr;
  }
}

// Calls a serverless analysis endpoint, which holds the provider's API key
// server-side and forwards the request to that provider's API. `content`
// keeps the same shape the old direct call used: an array with a
// {type:'text'} block and optionally a {type:'image', source:{data, media_type}} block.
//
// Multi-provider fallback: tries each provider in AI_PROVIDERS in order,
// using the exact same prompt/image for all of them.
const AI_PROVIDERS = [
  {name:'gemini', endpoint:'/api/analyze'},
  {name:'openai', endpoint:'/api/analyze-openai'},
  {name:'claude', endpoint:'/api/analyze-claude'}
];

async function callGemini(content){
  const textPart = content.find(c=>c.type==='text');
  const imagePart = content.find(c=>c.type==='image');
  if(!currentUser) throw new Error('You need to be signed in to analyze a meal.');
  const idToken = await currentUser.getIdToken();
  const body = JSON.stringify({
    prompt: textPart ? textPart.text : '',
    imageBase64: imagePart ? imagePart.source.data : null,
    imageMime: imagePart ? imagePart.source.media_type : null
  });

  const MAX_ATTEMPTS_PER_PROVIDER = 3;
  let lastErr;

  for(const provider of AI_PROVIDERS){
    for(let attempt=0; attempt<MAX_ATTEMPTS_PER_PROVIDER; attempt++){
      if(attempt>0) await new Promise(r=>setTimeout(r, attempt*900));

      let res;
      try{
        res = await fetch(provider.endpoint,{
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'Authorization':'Bearer '+idToken
          },
          body
        });
      }catch(networkErr){
        lastErr = networkErr;
        continue;
      }

      if(res.ok){
        const data = await res.json();
        try{
          return parseGeminiJson(data);
        }catch(parseErr){
          lastErr = parseErr;
          break;
        }
      }

      const errBody = await res.json().catch(()=>({}));
      const msg = errBody.error || `${provider.name} analysis error (${res.status})`;
      const isOverloaded = res.status===503 || /UNAVAILABLE|overloaded|high demand/i.test(msg);
      const isQuotaExceeded = res.status===429 || /quota|rate.?limit/i.test(msg);

      lastErr = new Error(msg);

      if(isQuotaExceeded) break;
      if(isOverloaded && attempt<MAX_ATTEMPTS_PER_PROVIDER-1) continue;
      break;
    }
  }

  throw lastErr || new Error('All analysis providers failed.');
}

// Best-effort recovery: if the model's JSON got cut off partway through the
// "items" array, keep every item object that closed cleanly and drop the
// dangling partial one, rather than failing the whole analysis.
function repairTruncatedItemsJson(jsonStr){
  const itemsKey = '"items":[';
  const idx = jsonStr.indexOf(itemsKey);
  if(idx===-1) return null;
  const arrStart = idx + itemsKey.length;
  let depth = 0, inStr = false, esc = false, lastCompleteEnd = -1;
  for(let i=arrStart; i<jsonStr.length; i++){
    const ch = jsonStr[i];
    if(inStr){
      if(esc){ esc=false; }
      else if(ch==='\\'){ esc=true; }
      else if(ch==='"'){ inStr=false; }
      continue;
    }
    if(ch==='"'){ inStr=true; continue; }
    if(ch==='{'){ depth++; }
    else if(ch==='}'){ depth--; if(depth===0) lastCompleteEnd = i; }
  }
  if(lastCompleteEnd===-1) return null;
  const rebuilt = jsonStr.slice(0, arrStart) + jsonStr.slice(arrStart, lastCompleteEnd+1) + ']}';
  try{ return JSON.parse(rebuilt); }catch(e){ return null; }
}

/* =========================================================
   FOOD LIBRARY
   Remembers a per-gram nutrient profile for foods you've logged
   before, keyed by normalized name. Two jobs:
   1) Fill in gaps Gemini leaves (e.g. amino acids it skipped)
      using what it told us about that same food last time.
   2) Every RECHECK_EVERY uses, skip the cache once and trust a
      fresh Gemini read instead, so the library can't drift stale
      forever — then re-learn from that fresh result.
========================================================= */
const RECHECK_EVERY = 8;

function normalizeFoodName(name){
  return (name||'').toLowerCase().trim().replace(/\s+/g,' ').replace(/[^a-z0-9 ]/g,'');
}

function findLibraryMatch(name){
  const key = normalizeFoodName(name);
  if(!key) return null;
  if(foodLibrary[key]) return foodLibrary[key];
  // Loose fallback match: e.g. "boiled egg" should still match "2 boiled eggs".
  const words = key.split(' ').filter(w=>w.length>3);
  if(!words.length) return null;
  for(const k in foodLibrary){
    const kWords = k.split(' ');
    if(words.every(w=>kWords.includes(w))) return foodLibrary[k];
  }
  return null;
}

// Runs on Gemini's raw items before they're shown to the person. Fills only
// the fields Gemini left blank/zero — anything Gemini did estimate this
// time is left alone, since a fresh read is generally at least as good.
function enrichItemsWithLibrary(items){
  return (items||[]).map(it=>{
    const match = findLibraryMatch(it.name);
    if(!match) return {...it, _libraryStatus:'new'};
    const dueForRecheck = match.timesUsed>0 && match.timesUsed % RECHECK_EVERY === 0;
    if(dueForRecheck) return {...it, _libraryStatus:'rechecking'};
    const grams = it.gramsEstimate || 0;
    const nutrients = {...(it.nutrients||{})};
    let filled = 0;
    for(const nid in match.perGram){
      const current = nutrients[nid];
      if(current===undefined || current===null || current===0){
        nutrients[nid] = Math.round(match.perGram[nid]*grams*100)/100;
        filled++;
      }
    }
    return {...it, nutrients, _libraryStatus: filled>0 ? 'enriched' : 'known'};
  });
}

// Called whenever a food is actually committed to the diary — teaches the
// library this food's per-gram profile so next time is faster and more
// complete. `trustFully=true` (manual entries, or a recheck pass) replaces
// the stored profile outright instead of blending with the old one.
function learnFromFood(name, grams, nutrients, trustFully){
  if(!grams || grams<=0 || !name) return;
  const key = normalizeFoodName(name);
  if(!key) return;
  const perGram = {};
  for(const nid in (nutrients||{})){
    const v = nutrients[nid];
    if(typeof v === 'number' && v>0) perGram[nid] = v/grams;
  }
  const existing = foodLibrary[key];
  if(existing){
    const wasRecheck = existing.timesUsed>0 && existing.timesUsed % RECHECK_EVERY === 0;
    if(trustFully || wasRecheck){
      existing.perGram = perGram;
    } else {
      const merged = {...existing.perGram};
      for(const nid in perGram){
        merged[nid] = merged[nid]!==undefined ? (merged[nid]+perGram[nid])/2 : perGram[nid];
      }
      existing.perGram = merged;
    }
    existing.timesUsed += 1;
    existing.lastUpdated = Date.now();
    existing.name = name;
  } else {
    foodLibrary[key] = {name, perGram, timesUsed:1, lastUpdated:Date.now()};
  }
}
async function persistFoodLibrary(){
  await storeSet('foodLibrary', foodLibrary);
}

function libraryBadge(status){

  if(status==='rechecking') return `<span class="tag" title="Periodic accuracy check — verifying this food's data fresh instead of using the cache this time">🔄 verifying</span>`;
  return '';
}

function showResults(items, photoBase64, mimeType){
  pendingResults = items.map((it,i)=>({...it, _id:'r'+Date.now()+i}));

  if(pendingResults.length===0){
    area.innerHTML = `<div class="error-box">Couldn't identify any food. Try a clearer photo or description.</div>`;

  }

  area.innerHTML = pendingResults.map(it=>{
    const nutrients = it.nutrients||{};
    const highlights = pickHighlightNutrients(nutrients, ['calories','protein'], 4);
    const standout = highlights[0] && highlights[0].pct>0 ? highlights[0] : null;
    return `
    <div class="result-card" id="card-${it._id}">
      <div class="rname">${escapeHtml(it.name)} <span class="tag">${it.confidence||'estimate'}</span> ${libraryBadge(it._libraryStatus)}</div>
      <div class="rmeta">~${it.gramsEstimate||'?'}g${standout?` · rich in ${escapeHtml(shortNutrientLabel(standout.name))}`:''}</div>

        <div><div class="l">Cal</div><div class="v">${Math.round(nutrients.calories||0)}</div></div>
        <div><div class="l">Protein</div><div class="v">${round1(nutrients.protein||0)}g</div></div>

/* ---------- Re-check nutrients for already-logged food ----------
   Fixes gaps (like missing amino acids) in entries logged before the
   analysis prompt improved, without retyping or re-photographing
   anything. Re-runs Gemini against the food's exact name + known
   quantity (so it only fills in nutrients, never re-guesses portion
   size), then patches any remaining gaps from the food library. */
const refreshingFoodIds = new Set();

async function reanalyzeSingleFood(food){
  const desc = food.grams ? `${food.grams}g of ${food.name}` : food.name;
  const prompt = buildPrompt('a single already-identified food (not a full meal — return exactly one item in the items array)')
    + `\n\nFood: "${desc}". This exact food and quantity is already logged — do not re-estimate the portion size, just provide its complete nutrient profile for this amount.`;
  const parsed = await callGemini([{type:'text', text: prompt}]);
  const raw = (parsed.items||[])[0];
  if(!raw) return null;
  const enriched = enrichItemsWithLibrary([raw])[0];
  return enriched.nutrients || {};
}

async function refreshFoodNutrients(id){
  if(refreshingFoodIds.has(id)) return;
  const day = await loadDay(currentDate);
  const food = (day.foods||[]).find(f=>f.id===id);
  if(!food) return;
  refreshingFoodIds.add(id);
  const btn = document.getElementById('refresh-'+id);
  if(btn) btn.classList.add('spinning');
  try{
    const fresh = await reanalyzeSingleFood(food);
    if(!fresh){ showToast(`Couldn't refresh ${food.name}`); return; }
    food.nutrients = fresh;
    learnFromFood(food.name, food.grams, food.nutrients);
    renderAll();
    showToast(`Refreshed ${food.name}`);
    saveDay(currentDate);
    persistFoodLibrary();
  }catch(err){
    showToast(`Couldn't refresh ${food.name}: ${err.message}`);
  }finally{
    refreshingFoodIds.delete(id);
  }
}

// Bulk version — re-checks every eligible food logged on the currently
// viewed day in one go (use shiftDate to land on yesterday first).
async function refreshAllFoodsForDay(){
  const day = await loadDay(currentDate);
  const targets = (day.foods||[]).filter(f=>!f.isWater && !f.id.startsWith('manual-'));
  if(!targets.length){ showToast('Nothing to re-check for this day'); return; }
  const statusEl = document.getElementById('dayRefreshStatus');
  let done = 0, failed = 0;
  for(const food of targets){
    if(statusEl) statusEl.textContent = `Re-checking ${done+failed+1}/${targets.length}: ${food.name}…`;
    try{
      const fresh = await reanalyzeSingleFood(food);
      if(fresh){
        food.nutrients = fresh;
        learnFromFood(food.name, food.grams, food.nutrients);
        done++;
      } else {
        failed++;
      }
    }catch(err){
      failed++;
    }
  }
  renderAll();
  if(statusEl) statusEl.textContent = '';
  showToast(`Re-checked ${done} food${done!==1?'s':''} for this day${failed?`, ${failed} failed`:''}`);
  saveDay(currentDate);
  persistFoodLibrary();
}

  day.foods = day.foods.filter(f=>f.id!==id);

}

  openModal('detailModal');
}

// Shows every nutrient logged for one diary entry: calories/protein/carbs/fat
// first as the basics, then everything else ranked by how much of the daily
// target it covers — so the food's standout nutrient (potassium for a
// banana, vitamin C for an orange, etc.) surfaces at the top instead of
// being buried in a flat alphabetical list.
async function openFoodEntryDetail(id){
  const day = await loadDay(currentDate);
  const f = (day.foods||[]).find(x=>x.id===id);
  if(!f) return;
  const nutrients = f.nutrients||{};
  document.getElementById('foodDetailModalName').textContent = f.name;

  const primaryIds = ['calories','protein','carbs','fat'];
  const primary = primaryIds.map(pid=>{
    const n = NUTRIENTS.find(x=>x.id===pid);
    const v = nutrients[pid]||0;
    return `<div><div class="l">${pid==='calories'?'Cal':n.name}</div><div class="v">${pid==='calories'?Math.round(v):round1(v)+n.unit}</div></div>`;
  }).join('');

  const highlights = nutrientHighlights(nutrients, primaryIds);
  const rows = highlights.length
    ? highlights.map((h,i)=>{
        const t = getTarget(h.id);
        const pctDisp = t>0 ? Math.round(h.pct) : null;
        const meta = CAT_META[h.cat] || {color:'var(--text-faint)'};
        return `<div class="fd-row${i===0?' standout':''}">
          <span class="dot" style="background:${meta.color}"></span>
          <div class="fname">${escapeHtml(h.name)}${i===0?'<span class="fd-badge">Most notable</span>':''}</div>
          ${t>0
            ? `<div class="fbar"><span style="width:${Math.min(100,pctDisp)}%; background:${meta.color}"></span></div><div class="famt">${round1(h.value)}${h.unit} · ${pctDisp}%</div>`
            : `<div class="famt">${round1(h.value)}${h.unit}</div>`}
        </div>`;
      }).join('')
    : `<div class="empty-state" style="padding:16px 0;">No additional nutrient data for this item yet — tap the ↻ on the diary row to check for more.</div>`;

  document.getElementById('foodDetailModalBody').innerHTML = `
    <div style="font-size:12.5px;color:var(--text-faint);margin-bottom:14px;">${f.grams?f.grams+(f.isWater?'ml':'g'):''}${f.grams&&f.time?' · ':''}${f.time||''}</div>
    <div class="fd-basics">${primary}</div>
    <div class="fd-section-label">Ranked by nutrient density (% of your daily target)</div>
    ${rows}
  `;
  openModal('foodDetailModal');
}

async function openRemainingModal(){
  const day = await loadDay(currentDate);
  const totals = computeTotals(day);
  const list = NUTRIENTS.filter(n=>getTarget(n.id)>0).map(n=>{
    const t = getTarget(n.id);
    const v = totals[n.id]||0;
    const pct = (v/t)*100;
    return {n, pct, v, t};
  }).sort((a,b)=> nutrientImportanceRank(a.n.id) - nutrientImportanceRank(b.n.id));
  const avgPct = list.length ? Math.round(list.reduce((s,x)=>s+Math.min(100,x.pct),0)/list.length) : 0;
  const metCount = list.filter(x=>x.pct>=100).length;
  document.getElementById('remainingModalBody').innerHTML = `
    <div class="remain-summary">
      <div class="big">${avgPct}%</div>
      <div class="sub">${metCount} of ${list.length} nutrients at target today</div>
    </div>
    ${list.map(x=>{
      const capped = Math.min(100,x.pct);
      const col = barColor(capped, `var(--${x.n.cat})`);
      return `<div class="remain-row" onclick="closeModal('remainingModal'); openNutrientDetail('${x.n.id}')">
        <span class="dot" style="background:${col}"></span>
        <div class="rname">${x.n.name}</div>
        <div class="rbar"><span style="width:${capped}%; background:${col}"></span></div>
        <div class="rpct">${Math.round(x.pct)}%</div>
      </div>`;
    }).join('')}
  `;
  openModal('remainingModal');
}

/* =========================================================
   TARGET OVERRIDE MODAL
========================================================= */
function openTargetModal(id){
  editingTargetId = id;
  const n = NUTRIENTS.find(x=>x.id===id);
  document.getElementById('targetModalName').textContent = 'Edit target — '+n.name;
  document.getElementById('targetInput').value = getTarget(id);
  openModal('targetModal');
}
async function saveTargetOverride(){
  const v = Number(document.getElementById('targetInput').value);
  targetOverrides[editingTargetId] = v;
  await storeSet('targetOverrides', targetOverrides);
  closeModal('targetModal');
  await renderAll();
}

/* =========================================================
   SETTINGS
========================================================= */
async function saveProfile(){
  profile = {
    age: Number(document.getElementById('pAge').value)||30,
    sex: document.getElementById('pSex').value,
    height: Number(document.getElementById('pHeight').value)||170,
    weight: Number(document.getElementById('pWeight').value)||70,
    activity: Number(document.getElementById('pActivity').value),
    goal: Number(document.getElementById('pGoal').value),
  };
  // Recalculates calorie/macro targets from the formula and stores them as
  // explicit overrides (otherwise the coach-plan defaults in NUTRIENTS keep applying).
  const cals = computeCalorieTarget();
  targetOverrides.calories = cals;
  targetOverrides.protein = Math.round(profile.weight*2.0);
  targetOverrides.fat = Math.round(cals*0.30/9);
  targetOverrides.carbs = Math.round((cals - targetOverrides.protein*4 - targetOverrides.fat*9)/4);
  await storeSet('targetOverrides', targetOverrides);
  const ok = await storeSet('profile', profile);
  showToast(ok ? 'Targets recalculated' : 'Recalculated for this session (cloud sync pending)');
  await renderAll();
}
function fillSettingsForm(){
  document.getElementById('pAge').value = profile.age;
  document.getElementById('pSex').value = profile.sex;
  document.getElementById('pHeight').value = profile.height;
  document.getElementById('pWeight').value = profile.weight;
  document.getElementById('pActivity').value = profile.activity;
  document.getElementById('pGoal').value = profile.goal;
}

async function exportData(){
  const keys = await listDayKeys().catch(()=>[]);
  const out = {profile, targetOverrides, days:{}};
  for(const k of keys){
    out.days[k] = await storeGet(k);
  }
  const blob = new Blob([JSON.stringify(out,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nutrient-export.json';
  a.click();
}

/* =========================================================
   TOAST
========================================================= */
let toastTimer=null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

document.querySelectorAll('.modal-backdrop').forEach(m=>{
  m.addEventListener('click', e=>{ if(e.target===m) m.classList.remove('open'); });
});
